name: Java CI with Gradle

on:
  push:
    tags:
      - "release-v*"
    # 當你推送到以 release-v 開頭的標籤時觸發 (例如 release-v1.0.0)
    # 打上版本標籤：git tag -a release-v1.0.0 -m "第一個正式版本"
    # 推送標籤到 GitHub：git push origin release-v1.0.0
    # 一旦 GitHub 偵測到這個 release-v* 開頭的 Tag，它就會自動啟動虛擬機
    # 並執行這個工作流程 (Workflow)，來構建你的 Minecraft Mod 並發布到 GitHub Release
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予建立 Release 的權限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft" # 推薦使用 Microsoft 或 Temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Cleanup Unwanted Jars # 在發布前刪除不需要的 jar 檔，確保 Release 乾淨
        run: |
          rm -f build/libs/*-sources.jar
          rm -f build/libs/*-dev.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 這裡會自動抓取 build/libs 下的所有 .jar 檔案
          files: |
            build/libs/*.jar
          # 自動從 tag 名稱產生標題
          name: 版本發布：${{ github.ref_name }}
          # 自動生成變更日誌 (也可以手動寫)
          generate_release_notes: true
          draft: false
          prerelease: false
